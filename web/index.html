<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Caption Mic</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
            background: #1a1a1a;
            color: #fff;
            padding: 24px;
            max-width: 600px;
            margin: 0 auto;
        }
        h1 { font-size: 24px; }
        button {
            font-size: 18px;
            padding: 16px 32px;
            border-radius: 8px;
            border: none;
            margin: 8px 8px 8px 0;
            cursor: pointer;
        }
        #start { background: #2ecc71; color: #fff; }
        #stop  { background: #e74c3c; color: #fff; }
        button:disabled { opacity: 0.4; cursor: not-allowed; }
        #status {
            margin-top: 16px;
            padding: 12px;
            background: #2a2a2a;
            border-radius: 8px;
            font-size: 14px;
        }
        #transcript {
            margin-top: 16px;
            padding: 16px;
            background: #2a2a2a;
            border-radius: 8px;
            min-height: 100px;
            font-size: 18px;
            line-height: 1.5;
            white-space: pre-wrap;
        }
        .interim { color: #aaa; font-style: italic; }
        #server-input {
            width: 100%;
            padding: 12px;
            font-size: 16px;
            border-radius: 8px;
            border: 1px solid #444;
            background: #2a2a2a;
            color: #fff;
            box-sizing: border-box;
            margin-bottom: 12px;
        }
    </style>
</head>
<body>
    <h1>🎤 Live Caption Mic</h1>

    <label for="server-input">Server URL (e.g. http://192.168.1.10:3000):</label>
    <input id="server-input" type="text" placeholder="http://YOUR-LAPTOP-IP:3000">

    <div>
        <button id="start" onclick="startRecognition()">Start</button>
        <button id="stop" onclick="stopRecognition()" disabled>Stop</button>
    </div>

    <div id="status">Idle.</div>
    <div id="transcript"></div>

    <script>
        const startBtn      = document.getElementById("start");
        const stopBtn       = document.getElementById("stop");
        const statusEl      = document.getElementById("status");
        const transcriptEl  = document.getElementById("transcript");
        const serverInput   = document.getElementById("server-input");

        // Persist server URL in localStorage so user doesn't have to retype
        serverInput.value = localStorage.getItem("stt_server") || "";
        serverInput.addEventListener("change", () => {
            localStorage.setItem("stt_server", serverInput.value.trim());
        });

        // Web Speech API (Chrome / Edge / Android Chrome)
        const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
        if (!SR) {
            statusEl.textContent = "ERROR: Web Speech API not supported in this browser. Use Chrome.";
            startBtn.disabled = true;
        }

        let recognition = null;
        let finalTranscript = "";
        let lastUploaded = "";
        let uploadTimer = null;

        function startRecognition() {
            const serverUrl = serverInput.value.trim();
            if (!serverUrl) {
                alert("Please enter the server URL first.");
                return;
            }
            localStorage.setItem("stt_server", serverUrl);

            recognition = new SR();
            recognition.continuous = true;
            recognition.interimResults = true;
            recognition.lang = "en-US";

            recognition.onstart = () => {
                statusEl.textContent = "Listening...";
                startBtn.disabled = true;
                stopBtn.disabled  = false;
            };

            recognition.onerror = (e) => {
                statusEl.textContent = "Error: " + e.error;
            };

            recognition.onend = () => {
                statusEl.textContent = "Stopped.";
                startBtn.disabled = false;
                stopBtn.disabled  = true;
                // Auto-restart if user didn't intentionally stop
                if (recognition && recognition._userStopped !== true) {
                    setTimeout(() => {
                        try { recognition.start(); } catch (_) {}
                    }, 500);
                }
            };

            recognition.onresult = (event) => {
                let interim = "";
                for (let i = event.resultIndex; i < event.results.length; i++) {
                    const result = event.results[i];
                    if (result.isFinal) {
                        finalTranscript += result[0].transcript + " ";
                    } else {
                        interim += result[0].transcript;
                    }
                }
                renderTranscript(finalTranscript, interim);

                // Upload latest text (debounced via setInterval below)
                const fullText = (finalTranscript + interim).trim();
                if (fullText && fullText !== lastUploaded) {
                    uploadText(fullText);
                    lastUploaded = fullText;
                }
            };

            recognition._userStopped = false;
            recognition.start();
        }

        function stopRecognition() {
            if (recognition) {
                recognition._userStopped = true;
                recognition.stop();
            }
        }

        function renderTranscript(finalText, interimText) {
            transcriptEl.innerHTML =
                escapeHTML(finalText) +
                '<span class="interim">' + escapeHTML(interimText) + '</span>';
        }

        function escapeHTML(s) {
            return s.replace(/[&<>"']/g, c => ({
                "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;"
            }[c]));
        }

        async function uploadText(text) {
            const serverUrl = serverInput.value.trim();
            if (!serverUrl) return;
            try {
                await fetch(serverUrl + "/upload", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ text })
                });
            } catch (err) {
                statusEl.textContent = "Upload error: " + err.message;
            }
        }
    </script>
</body>
</html>
